name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Download project
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      - name: Unzip project
        run: unzip -o TumunuiRide-Android-Prototype.zip

      - name: Build APK
        working-directory: TumunuiRide
        run: gradle assembleDebug

      - name: Save APK
        uses: actions/upload-artifact@v4
        with:
          name: TumunuiRide-debug-apk
          path: TumunuiRide/app/build/outputs/apk/debug/app-debug.apk
